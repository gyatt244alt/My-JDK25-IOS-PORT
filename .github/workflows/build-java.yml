name: Build Java 25 for iOS
on:  
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git
        cd mobile

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        # Force the configuration setup to stamp EVERYTHING as iOS from the absolute beginning
        sh configure \
          --openjdk-target=aarch64-apple-ios \
          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace \
          --with-extra-cflags="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0"

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        # Build the proper product image target for mobile architectures
        make CONF=ios-aarch64-server-release product-images

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        # Step into the freshly generated JDK lib directory where the real binaries live
        cd mobile/build/ios-aarch64-server-release/images/jdk/lib
        
        # Look for the compiled jli library (it might be libjli.a or natively libjli.dylib here)
        TARGET_LIB=$(find . -name "libjli.*" -print -quit)
        echo "Found target JLI library at: $TARGET_LIB"
        
        # If it's a static library archive, safely convert it using libtool
        if [[ "$TARGET_LIB" == *.a ]]; then
          xcrun libtool -dynamic -arch_only arm64 -syslibroot $(xcrun --sdk iphoneos --show-sdk-path) -compatibility_version 1.0 -current_version 1.0 -o libjli.dylib "$TARGET_LIB" -lSystem
        else
          echo "JLI is already a dynamic library or image component!"
        fi
        
        cd ../..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release

    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/jdk/
