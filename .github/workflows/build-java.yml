name: Build Java 25 for iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        
        # 1. Create a clean isolated header sandbox to avoid C++ namespace pollution
        mkdir -p mock_include
        cp "$(xcrun --sdk macosx --show-sdk-path)/usr/include/libproc.h" mock_include/
        
        mkdir -p mock_include/cups
        cp "$(xcrun --sdk macosx --show-sdk-path)/usr/include/cups/cups.h" mock_include/cups/
        cp "$(xcrun --sdk macosx --show-sdk-path)/usr/include/cups/ppd.h" mock_include/cups/
        
        # 2. Run configure referencing only our surgical sandbox path
        sh configure \
          --openjdk-target=aarch64-apple-ios \
          --with-sysroot=$(xcrun --sdk iphoneos --show-sdk-path) \
          --with-cups-include=$(pwd)/mock_include \
          --with-extra-cflags="-I$(pwd)/mock_include" \
          --with-extra-cxxflags="-I$(pwd)/mock_include" \
          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        make CONF=ios-aarch64-server-release static-libs-image

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        cd mobile/build/ios-aarch64-server-release/images/static-libs/lib
        
        # 1. Unpack the core engine static library completely
        mkdir -p extracted
        cd extracted
        ar -x ../server/libjvm.a
        
        # 2. Safety Net: Scan headers and destroy ONLY macOS host platform files
        find . -name "*.o" -exec sh -c 'otool -l "$1" | grep -E -q "platform 1|LC_VERSION_MIN_MACOSX"' _ {} \; -print -delete
        
        # 3. Use the required modern clang tool to build the iOS dylib
        clang -shared -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0 -Wl,-all_load -o ../libjli.dylib *.o -lSystem
        
        cd ..
        # Verify the file was successfully built
        ls -la libjli.dylib
        
        cd ..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release

    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/static-libs/
