name: Build Java 25 for iOS
on:  
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git
        cd mobile

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        sh configure \
          --openjdk-target=aarch64-apple-ios \          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        make CONF=ios-aarch64-server-release static-libs-image

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        cd mobile/build/ios-aarch64-server-release/images/static-libs/lib
        
        # Force link everything and explicitly tell the linker not to enforce the platform load commands
        clang -shared -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0 -Wl,-all_load -Xlinker -no_uuid -Wl,-flat_namespace -undefined dynamic_lookup -o libjli.dylib libjli.a
        
        cd ..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release

    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/static-libs/
