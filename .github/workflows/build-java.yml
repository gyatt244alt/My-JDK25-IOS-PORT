name: Build Java 25 for iOS

on:
  workflow_dispatch: # This adds a manual "Play" button so you can trigger the build whenever you want

jobs:
  build-ios:
    runs-on: macos-latest # Tells GitHub to spin up an internet Mac mini for you

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git
        cd mobile

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        sh configure \
          --openjdk-target=aarch64-apple-ios \
          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        # Build the standard images target which naturally handles dynamic libraries
        make CONF=ios-aarch64-server-release images

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        # Step into the native JDK home library folder generated by the build
        cd mobile/build/ios-aarch64-server-release/images/jdk/lib
        
        # If libjli.dylib was built as a macOS target bundle, we re-link it strictly for iOS
        if [ -f "libjli.a" ]; then
          clang -shared -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0 -Wl,-all_load -o libjli.dylib libjli.a
        fi
        
        cd ../..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release
        
    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/static-libs/
