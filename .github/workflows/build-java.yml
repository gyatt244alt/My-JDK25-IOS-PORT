name: Build Java 25 for iOS
on:  
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git
        cd mobile

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        # Force the configuration setup to stamp EVERYTHING as iOS from the absolute beginning
        sh configure \
          --openjdk-target=aarch64-apple-ios \
          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace \
          --with-extra-cflags="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0"

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        make CONF=ios-aarch64-server-release static-libs-image

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        cd mobile/build/ios-aarch64-server-release/images/static-libs/lib
        
        # 1. Create a temporary folder and extract all the object files (.o) from the archive
        mkdir -p extracted
        cd extracted
        ar -x ../libjli.a
        
        # 2. Use Apple's file tool to find and delete any object file that isn't built for iOS
        # This explicitly wipes out the accidental macOS build tools!
        find . -name "*.o" -exec sh -c 'file "$1" | grep -q "macOS" && rm "$1"' _ {} \;
        
        # 3. Pack the pure, remaining iOS object files back into a clean archive
        ar -crs ../libjli_clean.a *.o
        cd ..
        
        # 4. Now, linking with -all_load will succeed flawlessly because all remaining parts are 100% iOS!
        clang -shared -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0 -Wl,-all_load -o libjli.dylib libjli_clean.a
        
        cd ..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release

    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/static-libs/
