name: Build Java 25 for iOS
on:  
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 26 (The Builder Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Install Configuration Tools
      run: brew install autoconf

    - name: Download Mobile OpenJDK Source
      run: |
        git clone https://github.com/openjdk/mobile.git
        cd mobile

    - name: Configure Java 25 for iPad JIT
      run: |
        cd mobile
        sh configure \
          --openjdk-target=aarch64-apple-ios \
          --with-jvm-variants=server \
          --disable-warnings-as-errors \
          --disable-dtrace

    - name: Compile the Runtime Engine
      run: |
        cd mobile
        make CONF=ios-aarch64-server-release static-libs-image

    - name: Convert Static Library to Valid Mach-O Dylib
      run: |
        cd mobile/build/ios-aarch64-server-release/images/static-libs/lib
        
        # 1. Extract the actual core engine archive file
        mkdir -p extracted
        cd extracted
        ar -x ../server/libjvm.a
        
        # 2. Iterate through every object file and force its platform header to be iOS (Platform 2)
        # This overwrites any lingering macOS build signatures
        for file in *.o; do
          xcrun vtool -set-build-version ios 14.0 14.0 -replace -output "$file" "$file" 2>/dev/null || true
        done
        
        # 3. Pack the newly stamped iOS object files into a clean archive
        ar -crs ../libjvm_clean.a *.o
        cd ..
        
        # 4. Link the clean archive into the final dylib file Amethyst needs
        clang -shared -dynamiclib -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -miphoneos-version-min=14.0 -Wl,-all_load -o libjli.dylib libjvm_clean.a
        
        cd ..
        echo 'JAVA_VERSION="25"' > release
        echo 'OS_NAME="iOS"' >> release
        echo 'OS_ARCH="aarch64"' >> release

    - name: Upload the Finished JRE Core
      uses: actions/upload-artifact@v4
      with:
        name: ios-java25-core
        path: mobile/build/ios-aarch64-server-release/images/static-libs/
